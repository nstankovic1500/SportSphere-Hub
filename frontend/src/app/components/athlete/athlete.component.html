<section class="page">
  <h1>Athlete Dashboard</h1>
  <p>Welcome, {{ user?.firstName }}</p>
  <p>Role: {{ user?.role }}</p>
  <div class="dashboard-links">
    <a class="dashboard-link" routerLink="/athlete/profile">
      View profile
    </a>
    <a class="dashboard-link" routerLink="/facilities">
      Browse facilities
    </a>
  </div>
  <button type="button" (click)="logout()">Logout</button>
</section>
